<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#000000">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="icon" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024"%3E%3Crect width="1024" height="1024" fill="%23662266"/%3E%3Ctext x="512" y="560" text-anchor="middle" dominant-baseline="middle" font-family="Arial,%20sans-serif" font-size="450" font-weight="700" letter-spacing="6" fill="%23ffffff" opacity="1"%3EA3M%3C/text%3E%3C/svg%3E'>
<title>a3m</title>
<style>
	html, body {
		width: 100%;
		height: 100%;
		margin: 0;
	}

	body {
		overflow: hidden;
		background: #000;
	}

	.wrap {
		display: flex;
		width: 100vw;
		height: 100vh;
	}

	.fill {
		flex: 1 1 0;
		min-width: 0;
		min-height: 0;
		background-image: url("a3m.webp");
		background-repeat: no-repeat;
	}

	.center {
		flex: 0 0 auto;
		background-image: url("a3m.webp");
		background-repeat: no-repeat;
	}

	/* landscape: GMI | IMG | GMI */
	.wrap {
		flex-direction: row;
	}

	.fill-a,
	.fill-b {
		background-size: auto 100vh;
		transform: scaleX(-1);
		transform-origin: center center;
	}

	.fill-a {
		background-position: left center;
	}

	.fill-b {
		background-position: right center;
	}

	.center {
		width: min(100vw, 100vh);
		height: 100vh;
		background-size: auto 100vh;
		background-position: center center;
	}

	/* portrait: GMI / IMG / GMI */
	@media (orientation: portrait) {
		.wrap {
			flex-direction: column;
		}

		.fill-a,
		.fill-b {
			background-size: 100vw auto;
			transform: scaleY(-1);
		}

		.fill-a {
			background-position: center top;
		}

		.fill-b {
			background-position: center bottom;
		}

		.center {
			width: 100vw;
			height: min(100vw, 100vh);
			background-size: 100vw auto;
			background-position: center center;
		}
	}

.vignette {
	position: fixed;
	inset: 0;
	pointer-events: none;
	background:
		radial-gradient(
			ellipse at center,
			rgba(0,0,0,0) 12%,
			rgba(0,0,0,0.20) 34%,
			rgba(0,0,0,0.52) 58%,
			rgba(0,0,0,0.82) 80%,
			rgba(0,0,0,0.98) 100%
		),
		linear-gradient(
			to bottom,
			rgba(0,0,0,0.22) 0%,
			rgba(0,0,0,0.04) 22%,
			rgba(0,0,0,0.04) 78%,
			rgba(0,0,0,0.28) 100%
		);
}

</style>
</head>
<body>
	<div class="wrap">
		<div class="fill fill-a"></div>
		<div class="center"></div>
		<div class="fill fill-b"></div>
	</div>
	<div class="vignette"></div>
</body>
</html>
