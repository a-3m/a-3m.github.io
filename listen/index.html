<!doctype html>
<html lang="en">
<!-- file: index.0.html -->
<!-- # vim: set ts=4 sw=4 sts=4 noet : -->
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<meta name="theme-color" content="#000000">
	<link rel="manifest" href="a3m.webmanifest">
	<title>A3M Listen</title>
	<link rel="stylesheet" href="icons/a3m.icons.css">
	<link rel="stylesheet" href="a3m.css?0000">
	<link rel="stylesheet" href="extra.css?001">
	<script src="/libs/logs-core.js?a3m"></script>
	<!--
		<script src="/libs/logs-local.js?a3m"></script>
	-->
	<script src="/libs/logs-ws.js?a3m"></script>
	<script src="app.js?0"></script>
</head>
<body>

	<h1 class="a3m-brand"><a href="#">Listen Another Music</a></h1>
	<button type="button" class="a3m-install-btn" data-act="install-app" hidden>Install app</button>

	<div
		class="a3m"
		data-role="app"
		data-a3m-play="stop"
		data-a3m-mode="main"
		data-a3m-main="idle"
		data-a3m-next="idle"
		data-a3m-aux="idle"
		data-a3m-more="0"
		data-a3m-preview=""
		data-a3m-repeat="0"
		data-a3m-shuffle="0"
		data-a3m-aux-test="0"
		data-a3m-cover="fake"
		data-a3m-debug="0"
		data-playlist-src="listen0.m3u"
	>
		<div class="a3m-bg" aria-hidden="true"></div>
		<div class="a3m-shade" aria-hidden="true"></div>
		<div class="a3m-vignette" aria-hidden="true"></div>

		<button type="button" class="a3m-fs a3m-icon-btn" data-act="fullscreen" aria-label="Toggle fullscreen"></button>

		<div class="a3m-status" data-role="status"></div>

		<div class="a3m-ui">
			<div class="a3m-top"></div>

			<div class="a3m-cover" data-role="cover" aria-hidden="true"></div>

			<div class="a3m-meta">
				<div class="a3m-title" data-role="title">Listen</div>
				<div class="a3m-artist" data-role="artist"></div>
				<div class="a3m-albumline">
					<span data-role="album"></span><span class="a3m-sep">·</span><span data-role="year"></span>
				</div>
			</div>

			<div class="a3m-control-zone">
				<div class="a3m-extra-line">
					<div class="a3m-extra" data-role="extra">
						<button type="button" class="a3m-mini-btn a3m-icon-btn" data-act="begin" aria-label="Begin"></button>
						<button type="button" class="a3m-mini-btn a3m-icon-btn" data-act="stop" aria-label="Stop"></button>
						<button type="button" class="a3m-mini-btn a3m-icon-btn" data-act="repeat" aria-label="Repeat"></button>
						<button type="button" class="a3m-mini-btn a3m-icon-btn" data-act="shuffle" aria-label="Shuffle"></button>
						<button type="button" class="a3m-mini-btn a3m-icon-btn" data-act="aux-test" aria-label="Aux test"></button>
						<button type="button" class="a3m-mini-btn a3m-icon-btn" data-act="refresh" aria-label="Refresh"></button>
						<a class="a3m-mini-btn a3m-icon-btn a3m-download" data-act="download" aria-label="Download"></a>
					</div>
				</div>

				<div class="a3m-progress" data-act="seek" aria-label="Seek">
					<div class="a3m-progress-track"></div>
					<div class="a3m-progress-buffer"></div>
					<div class="a3m-progress-fill"></div>
					<div class="a3m-progress-seek-text" aria-hidden="true"></div>
				</div>

				<div class="a3m-main-row">
					<button
						type="button"
						class="a3m-main-btn a3m-icon-btn a3m-main-dummy-more"
						aria-label="Reserved"
						data-act="extra"
						tabindex="-1"
					></button>
					<button type="button" class="a3m-main-btn a3m-icon-btn" data-act="prev" aria-label="Previous"></button>
					<button type="button" class="a3m-main-btn a3m-main-toggle a3m-icon-btn" data-act="toggle" aria-label="Play or pause"></button>
					<button type="button" class="a3m-main-btn a3m-icon-btn" data-act="next" aria-label="Next"></button>
					<button type="button" class="a3m-main-btn a3m-icon-btn" data-act="more" aria-label="More controls"></button>
				</div>

			</div>

			<div class="a3m-tech" data-role="tech">
				<span data-role="tech-main"></span>
				<span data-role="tech-next"></span>
				<span data-role="tech-aux"></span>
				<span data-role="tech-net"></span>
			</div>
		</div>
	</div>

	<script src="a3m.js?9"></script>
	<script src="extra.js?92"></script>

</body>
</html>
