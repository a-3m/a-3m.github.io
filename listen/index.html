<!DOCTYPE html>
<html lang="en">
<!-- file: index.1.html -->
<!-- # vim: set ts=4 sw=4 sts=4 noet : -->
<!--
	#STYLE RULES
	- Preserve existing style unless readability clearly improves.
	- Keep code visually calm, compact, and easy to scan.
	- Prefer direct, idiomatic JS + HTML + CSS + SVG
-->
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Listen Another Music [A3M] AAAM</title>
		<script>
		const A3M_ASSET_SUFFIX = '?v=222242';

		function include(){
			let i = 0;

			for (i = 0; i < arguments.length; i++) {
				document.write('<script src="' + arguments[i] + A3M_ASSET_SUFFIX + '"><\/script>');
			}
		}

		function css(){
			let i = 0;

			for (i = 0; i < arguments.length; i++) {
				document.write('<link rel="stylesheet" href="' + arguments[i] + A3M_ASSET_SUFFIX + '">');
			}
		}

		css(
			'a3m.0.css',
			'a3m.player.icons.css',
			'a3m.player.default.css'
		);
		</script>
	</head>
	<body>
		<div class="header">
			<h1>Listen Another Music</h1>
			<div class=slogan>
				No format, just feeling
			</div>
			<div class=links>
				<a href="https://another-art-another-music.pages.dev/">A3M</a> |
				<a href="https://www.youtube.com/@another-art-another-music">YT page</a> |
				<a href="">About</a>
			</div>
		</div>

		<!--[a3m-player]-->

		<div
			id="a3m-player"
			class="a3m-player a3m-play"

			data-playlist-src="music4.m3u?2"
			--data-playlist-shuffle="1"

			data-output-mode="auto"
			data-autoplay="1"
			data-state-hidden="1"
			data-gesture-hidden="0"
		>
			<div class="a3m-ui-volume-side">
				<div class="a3m-ui-volume-v">
					<div class="a3m-ui-volume-v-track">
						<div class="a3m-ui-volume-v-fill"></div>
					</div>
					<input class="a3m-ui-volume-range a3m-ui-volume-range-v" type="range" min="0" max="1000" step="1" value="1000" data-role="volume">
				</div>
			</div>
			<div class="a3m-ui" data-a3m-example="1">
				<div class="a3m-ui-head">
					<div class="a3m-ui-cover" data-a3m-cover="256"></div>
					<div class="a3m-ui-title" data-role="title"></div>
					<div class="a3m-ui-subtitle">
						<span class="a3m-ui-meta" data-role="meta-artist"></span>
						<span class="a3m-ui-meta" data-role="meta-album"></span>
						<span class="a3m-ui-meta" data-role="meta-year"></span>
						<span class="a3m-ui-meta" data-role="meta-track"></span>
					</div>
				</div>
				<div class="a3m-ui-progress-block">
					<div class="a3m-ui-progress-head">
						<span data-role="playlist-pos"></span>
						<span><span data-role="time-now"></span> / <span data-role="time-total"></span></span>
					</div>
					<div class="a3m-ui-progress-bar" data-role="progress">
						<div class="a3m-ui-progress-fill"></div>
					</div>
				</div>
<!--
				<div class="a3m-ui-volume-block">
					<div class="a3m-ui-volume-head">
						<span>volume</span>
						<span data-role="volume-text"></span>
					</div>
					<div class="a3m-ui-volume-bar">
						<div class="a3m-ui-volume-fill"></div>
						<input class="a3m-ui-volume-range" type="range" min="0" max="1000" step="1" value="1000" data-role="volume">
					</div>
				</div>
-->
				<div class="a3m-ui-controls">
					<div class="a3m-ui-row a3m-ui-row-main">
						<button type="button" class="a3m-ui-btn a3m-ui-btn-toggle a3m-ui-btn-icon" data-act="toggle" aria-label="Play or pause"></button>
<!--
						<button type="button" class="a3m-ui-btn a3m-ui-btn-stop a3m-ui-btn-icon" data-act="stop" aria-label="Stop"></button>
-->
						<button type="button" class="a3m-ui-btn a3m-ui-btn-prev a3m-ui-btn-icon" data-act="prev" aria-label="Previous"></button>
						<button type="button" class="a3m-ui-btn a3m-ui-btn-next a3m-ui-btn-icon" data-act="next" aria-label="Next"></button>
						<button type="button" class="a3m-ui-btn a3m-ui-btn-shuffle a3m-ui-btn-icon" data-act="shuffle" aria-label="Shuffle"></button>
						<button type="button" class="a3m-ui-btn a3m-ui-btn-repeat a3m-ui-btn-icon" data-act="repeat" aria-label="Repeat"></button>
						<button type="button" class="a3m-ui-btn a3m-ui-btn-fullscreen a3m-ui-btn-icon" data-act="fullscreen" aria-label="Toggle fullscreen"></button>
												<button type="button" class="a3m-ui-btn a3m-ui-btn-more a3m-ui-btn-icon" aria-label="More"></button>

						<button type="button" class="a3m-ui-btn a3m-ui-btn-playlist a3m-ui-btn-icon" data-act="playlist" aria-label="Playlist panel"></button>
						<button type="button" class="a3m-ui-btn a3m-ui-btn-share a3m-ui-btn-icon" data-act="share" aria-label="Share current page QR"></button>
						<button type="button" class="a3m-ui-btn a3m-ui-btn-share-track a3m-ui-btn-icon" data-act="share-track" aria-label="Share current track QR"></button>
						<button type="button" class="a3m-ui-btn a3m-ui-btn-channel a3m-ui-btn-icon" data-act="mode" aria-label="Output channel mode"></button>
						<button type="button" class="a3m-ui-btn a3m-ui-btn-mute a3m-ui-btn-icon" data-act="mute" aria-label="Volume or mute"></button>
						<button type="button" class="a3m-ui-btn a3m-ui-btn-download a3m-ui-btn-icon" aria-label="Download file"></button>
						<button type="button" class="a3m-ui-btn a3m-ui-btn-viewmode a3m-ui-btn-icon" aria-label="View mode"></button>
						<button type="button" class="a3m-ui-btn a3m-ui-btn-close a3m-ui-btn-icon" aria-label="Close"></button>
						<button type="button" class="a3m-ui-btn a3m-ui-btn-refresh a3m-ui-btn-icon" data-act="refresh" aria-label="Refresh page"></button>

						</div>
				</div>

				<pre class="a3m-ui-state" data-role="state"></pre>
			</div>
		</div>
		<div class="a3m-ui-gesture" data-role="gesture-pad" data-a3m-gesture-for="a3m-player">
			<div class="a3m-ui-gesture-note">
				Tap play / pause<br>
				Swipe ↑ ↓ volume<br>
				Swipe ← → track<br>
				Two-finger ↓ logs<br>
				Alt+G toggle
			</div>
		</div>
		<script>
		window.__logs_cfg = {
			id: 'a3m-listen'
		};
		</script>
		<script>
		include(
			'/libs/logs-core.js',
			'/libs/logs-local.js',
			'/libs/logs-ws.js',
			'/libs/a3m-qrcode.js',
			'a3m.log.js',
			'a3m.icons.js',
			'a3m.bus.js',
			'a3m.player.js',
			'a3m.plugin.meta.file.js',
			'a3m.plugin.playlist.source.js',
			'a3m.plugin.output.graph.js',
			'a3m.plugin.autonext.js',
			'a3m.plugin.gesture.js',
			'a3m.plugin.mediasession.js',
			'a3m.plugin.covergen.js',
			'a3m.plugin.coverbg.js',
			'a3m.boot.example.js'
		);
		</script>
		<!--[/a3m-player]-->
	</body>
</html>
